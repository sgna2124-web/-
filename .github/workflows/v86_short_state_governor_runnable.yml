name: 86V Short State Governor Runnable

on:
  workflow_dispatch:
  push:
    paths:
      - 'experiments/v86_short_base.json'
      - 'experiments/v86_short_combinations.json'
      - 'scripts/run_backtest_batch_json_only_timeout18_time_reduce_v86_short_state_governor_runnable.py'
      - '.github/workflows/v86_short_state_governor_runnable.yml'

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 720

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy

      - name: Run 86V short state governor
        run: |
          python scripts/run_backtest_batch_json_only_timeout18_time_reduce_v86_short_state_governor_runnable.py

      - name: Upload 86V artifact
        uses: actions/upload-artifact@v4
        with:
          name: 86V-short-state-governor-results
          path: results_json_only_timeout18_time_reduce_v86_short_state_governor/

      - name: Print 86V summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          p = Path('results_json_only_timeout18_time_reduce_v86_short_state_governor/master_summary.json')
          if not p.exists():
              raise SystemExit('master_summary.json not found')
          data = json.loads(p.read_text(encoding='utf-8'))
          print(json.dumps(data, ensure_ascii=False, indent=2))
          PY
