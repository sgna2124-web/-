name: v85_long_preserve_reclaim_runnable

on:
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy

      - name: Run batch
        run: |
          python scripts/run_backtest_batch_json_only_timeout18_time_reduce_v85_long_preserve_reclaim_runnable.py

      - name: Print lane summary
        run: |
          if [ -f results_json_only_timeout18_time_reduce_v85_long_preserve_reclaim_runnable/lane_summary.csv ]; then
            python - <<'PY'
import pandas as pd
p='results_json_only_timeout18_time_reduce_v85_long_preserve_reclaim_runnable/lane_summary.csv'
df=pd.read_csv(p)
print(df.sort_values(['final_return','mdd'], ascending=[False, True]).to_string(index=False))
PY
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: v85_long_preserve_reclaim_runnable
          path: results_json_only_timeout18_time_reduce_v85_long_preserve_reclaim_runnable
