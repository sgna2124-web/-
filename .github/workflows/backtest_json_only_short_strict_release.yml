name: Repository Backtest JSON Only Short Strict Release Assets

on:
  workflow_dispatch:

jobs:
  run-backtest-json-only-short-strict-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_BASE_URL: https://github.com/sgna2124-web/-/releases/latest/download
      DATA_ROOT: /home/runner/work/_temp/market_data_5m
      DATA_DIR: /home/runner/work/_temp/market_data_5m
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare data directory
        run: |
          mkdir -p "$DATA_ROOT"

      - name: Download manifest
        run: |
          curl -L "${RELEASE_BASE_URL}/data_manifest.json" -o "$DATA_ROOT/data_manifest.json"

      - name: Download release assets listed in manifest
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          root = Path(os.environ["DATA_ROOT"])
          manifest = json.loads((root / "data_manifest.json").read_text(encoding="utf-8"))
          base = os.environ["RELEASE_BASE_URL"]

          for item in manifest["files"]:
              name = item["filename"]
              out = root / name
              url = f"{base}/{name}"
              print(f"downloading {url} -> {out}")
              subprocess.run(["curl", "-L", url, "-o", str(out)], check=True)
          PY

      - name: Decompress csv.gz files
        run: |
          python - <<'PY'
          import gzip
          import shutil
          import os
          from pathlib import Path

          root = Path(os.environ["DATA_ROOT"])
          for gz_path in root.glob("*.csv.gz"):
              csv_path = root / gz_path.name[:-3]
              with gzip.open(gz_path, "rb") as f_in:
                  with open(csv_path, "wb") as f_out:
                      shutil.copyfileobj(f_in, f_out)
          PY

      - name: Run JSON-only short_strict backtests
        run: |
          python scripts/run_backtest_batch_json_only_short_strict.py
          python scripts/summarize_results_json_only_short_strict.py

      - name: Upload JSON-only short_strict results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results-json-only-short-strict-release
          path: results_json_only_short_strict/**

      - name: Commit JSON-only short_strict summary files only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results_json_only_short_strict/*/summary.json
          git add results_json_only_short_strict/single_changes_quick_summary.csv
          git add results_json_only_short_strict/master_summary.csv results_json_only_short_strict/master_summary.json results_json_only_short_strict/master_summary.txt
          git diff --cached --quiet || git commit -m "Update JSON-only short_strict release-asset backtest summaries"
          git push
