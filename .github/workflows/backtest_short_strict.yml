name: Repository Backtest Short Strict

on:
  workflow_dispatch:

jobs:
  run-backtest-short-strict:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull LFS files
        run: git lfs pull

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run short_strict individual backtests
        run: |
          python scripts/run_backtest_batch_short_strict.py
          python scripts/summarize_results_short_strict.py

      - name: Upload full short_strict results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results-short-strict
          path: results_short_strict/**

      - name: Commit short_strict summary files only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results_short_strict/master_summary.csv results_short_strict/master_summary.json results_short_strict/master_summary.txt
          git add results_short_strict/*/summary.json
          git diff --cached --quiet || git commit -m "Update short_strict backtest summaries"
          git push
