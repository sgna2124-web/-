name: Repository Backtest JSON Only Short Strict

on:
  workflow_dispatch:

jobs:
  run-backtest-json-only-short-strict:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DATA_DIR: 5m_data
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run JSON-only short_strict backtests
        run: |
          python scripts/run_backtest_batch_json_only_short_strict.py

      - name: Upload JSON-only short_strict results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results-json-only-short-strict
          path: results_json_only_short_strict/**

      - name: Commit JSON-only short_strict summary files only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results_json_only_short_strict/*/summary.json
          git add results_json_only_short_strict/single_changes_quick_summary.csv
          git diff --cached --quiet || git commit -m "Update JSON-only short_strict backtest summaries"
          git push
