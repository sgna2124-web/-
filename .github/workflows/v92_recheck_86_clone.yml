name: 92V Recheck 86 Clone

on:
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 720
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Install Git LFS and pull objects
        run: git lfs install && git lfs pull

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install pandas numpy

      - name: Run 86V short state governor
        run: python scripts/run_backtest_batch_json_only_timeout18_time_reduce_v86_short_state_governor_runnable.py
