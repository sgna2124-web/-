name: Repository Backtest

on:
  workflow_dispatch:

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull LFS files
        run: git lfs pull

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backtests
        run: |
          python scripts/run_backtest_batch.py
          python scripts/summarize_results.py

      - name: Upload full results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: results/**

      - name: Commit summary files only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results/master_summary.csv results/master_summary.json results/master_summary.txt
          git add results/*/summary.json
          git diff --cached --quiet || git commit -m "Update backtest summaries"
          git push
