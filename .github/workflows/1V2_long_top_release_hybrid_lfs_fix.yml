name: 1V2 Long Top Release Hybrid LFS Fix

on:
  workflow_dispatch:
  push:
    paths:
      - 'experiments/1V2_long_top_release_hybrid_base.json'
      - 'experiments/1V2_long_top_release_hybrid_combinations.json'
      - 'scripts/run_backtest_batch_json_only_timeout18_time_reduce_1V2_long_top_release_hybrid.py'
      - '.github/workflows/1V2_long_top_release_hybrid_lfs_fix.yml'

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 720

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Install Git LFS and pull objects
        run: |
          git lfs install
          git lfs pull

      - name: Validate data files are real CSVs
        run: |
          python - <<'PY2'
          from pathlib import Path
          sample = next(Path('5m_data').glob('*.csv'), None)
          if sample is None:
              raise SystemExit('5m_data csv not found')
          head = sample.read_text(encoding='utf-8', errors='ignore')[:200]
          if 'https://git-lfs.github.com/spec/v1' in head:
              raise SystemExit(f'LFS pointer still present: {sample}')
          print(f'Data ready: {sample}')
          PY2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy

      - name: Run 1V2 long top release hybrid
        run: |
          python scripts/run_backtest_batch_json_only_timeout18_time_reduce_1V2_long_top_release_hybrid.py

      - name: Upload 1V2 long artifact
        uses: actions/upload-artifact@v4
        with:
          name: 1V2-long-top-release-hybrid-results-lfs-fix
          path: results_json_only_timeout18_time_reduce_1V2_long_top_release_hybrid/

      - name: Print 1V2 long summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          p = Path('results_json_only_timeout18_time_reduce_1V2_long_top_release_hybrid/master_summary.json')
          if not p.exists():
              raise SystemExit('master_summary.json not found')
          data = json.loads(p.read_text(encoding='utf-8'))
          print(json.dumps(data, ensure_ascii=False, indent=2))
          PY
